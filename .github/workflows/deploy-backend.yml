name: Deploy Backend to EC2

on:
  push:
    branches:
      - master
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-backend-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy backend via SSM
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy with SSM Run Command
        id: deploy
        shell: bash
        run: |
          set -euo pipefail

          INSTANCE_ID="${{ vars.EC2_INSTANCE_ID }}"

          cat > ssm-parameters.json <<'JSON'
          {
            "commands": [
              "set -euo pipefail",
              "cd /home/ec2-user/stock-market",
              "sudo -u ec2-user git fetch origin master",
              "sudo -u ec2-user git checkout master",
              "sudo -u ec2-user git pull --ff-only origin master",
              "sudo -u ec2-user /home/ec2-user/stock-market/backend/venv/bin/pip install -r /home/ec2-user/stock-market/backend/requirements.txt",
              "chmod +x /home/ec2-user/stock-market/backend/deploy/fetch-env.sh",
              "sudo cp /home/ec2-user/stock-market/backend/deploy/stock-market-env.service /etc/systemd/system/stock-market-env.service",
              "sudo cp /home/ec2-user/stock-market/backend/deploy/stock-market.service /etc/systemd/system/stock-market.service",
              "sudo systemctl daemon-reload",
              "sudo systemctl restart stock-market-env",
              "sudo systemctl restart stock-market",
              "sleep 3",
              "curl -fsS http://127.0.0.1:8000/health"
            ]
          }
          JSON

          COMMAND_ID="$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "${INSTANCE_ID}" \
            --comment "Deploy stock-market backend from GitHub Actions ${GITHUB_SHA}" \
            --parameters file://ssm-parameters.json \
            --query "Command.CommandId" \
            --output text)"

          echo "command_id=${COMMAND_ID}" >> "${GITHUB_OUTPUT}"
          echo "Started SSM command: ${COMMAND_ID}"

      - name: Wait for deploy command
        shell: bash
        run: |
          set -euo pipefail

          INSTANCE_ID="${{ vars.EC2_INSTANCE_ID }}"
          COMMAND_ID="${{ steps.deploy.outputs.command_id }}"

          for attempt in {1..60}; do
            STATUS="$(aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${INSTANCE_ID}" \
              --query "Status" \
              --output text 2>/dev/null || true)"

            echo "Attempt ${attempt}: ${STATUS:-pending}"

            case "${STATUS}" in
              Success)
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${INSTANCE_ID}" \
                  --query "{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}" \
                  --output json
                exit 0
                ;;
              Failed|Cancelled|TimedOut|Cancelling)
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${INSTANCE_ID}" \
                  --query "{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}" \
                  --output json
                exit 1
                ;;
            esac

            sleep 5
          done

          echo "Timed out waiting for SSM command ${COMMAND_ID}" >&2
          exit 1
