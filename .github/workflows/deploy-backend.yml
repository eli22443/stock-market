name: Deploy Backend

on:
  push:
    branches:
      - master
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy to EC2
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ vars.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Stock Market Backend" \
            --parameters 'commands=[
              "set -e",

              "sudo -u ec2-user bash -c \"cd /home/ec2-user/stock-market && git fetch origin && git reset --hard origin/master\"",

              "sudo systemctl restart stock-market-env",

              "sudo -u ec2-user /home/ec2-user/stock-market/backend/venv/bin/pip install -r /home/ec2-user/stock-market/backend/requirements.txt",

              "sudo systemctl daemon-reload",
              "sudo systemctl restart stock-market",

              "sudo systemctl is-active --quiet stock-market",

              "for i in {1..15}; do curl -fsS http://127.0.0.1:8000/health && exit 0; sleep 2; done",

              "echo Deployment failed",
              "exit 1"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_ENV

      - name: Wait for deployment
        run: |
          while true; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ vars.EC2_INSTANCE_ID }}" \
              --query Status \
              --output text)

            echo "Status: $STATUS"

            if [[ "$STATUS" == "Success" ]]; then
              break
            fi

            if [[ "$STATUS" == "Failed" || "$STATUS" == "Cancelled" || "$STATUS" == "TimedOut" ]]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ vars.EC2_INSTANCE_ID }}" \
                --query StandardErrorContent \
                --output text

              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ vars.EC2_INSTANCE_ID }}" \
                --query StandardOutputContent \
                --output text

              exit 1
            fi

            sleep 5
          done

      - name: Show deployment output
        run: |
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ vars.EC2_INSTANCE_ID }}" \
            --query StandardOutputContent \
            --output text
